################################
# Basic Configuration
################################
spring.application.name=research-service
spring.profiles.active=${profile}
spring.jackson.serialization.indent_output=true

################################
# Config Server Configuration
################################
spring.cloud.config.uri=${configURI}
spring.cloud.config.username=${configUser}
spring.cloud.config.password=${configPass}
encrypt.key=${propKey}

################################
# Server Configuration
################################
server.servlet.context-path=/ForrSVC
server.port=9026
server.tomcat.basedir=${app.home}/tomcat
server.tomcat.accesslog.enabled=true

################################
# Management Configuration
################################
management.endpoints.web.exposure.include=health,info,env,shutdown,loggers,refresh,caches
management.endpoint.shutdown.enabled=true
endpoints.shutdown.enabled=true

################################
# SD Research Subtypes
################################
forr.sd.research.subtypes=business requirements guide,buyer insights report,case study,cmo next point,cmo vantage point,core strategy report,cso executive brief,e-book,magazine,research brief,research toolkit,role profile,service provider perspective,siriuspulse,technology perspective,template,Interactive Model

################################
# Kafka Common Configuration
################################
spring.kafka.ssl.trust-store-type=jks
spring.kafka.ssl.trust-store-location=${forr.kafka.jks.path}
spring.kafka.ssl.trust-store-password=${forr.kafka.ssl.password}

################################
# Kafka Producer Configuration
################################
spring.kafka.producer.bootstrap-servers=${forr.kafka.bootstrap-servers}
spring.kafka.producer.acks=all
spring.kafka.producer.properties.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username=\"${forr.kafka.login.username}\" password=\"${forr.kafka.login.password}\";
spring.kafka.producer.security.protocol=SASL_SSL
spring.kafka.producer.properties.sasl.mechanism=PLAIN
spring.kafka.properties.reconnect.backoff.ms=5000
spring.kafka.properties.max.block.ms=5000
spring.kafka.admin.properties.request.timeout.ms=5000


################################
# Kafka Consumer Configuration
################################
spring.kafka.consumer.bootstrap-servers=${forr.kafka.bootstrap-servers}
spring.kafka.consumer.properties.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username=\"${forr.kafka.login.username}\" password=\"${forr.kafka.login.password}\";
spring.kafka.consumer.security.protocol=SASL_SSL
spring.kafka.consumer.properties.sasl.mechanism=PLAIN
spring.kafka.consumer.auto-offset-reset=earliest
################################
# JPA / Hibernate configuration
################################
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=none
#spring.jpa.database-platform=org.hibernate.dialect.Oracle10gDialect   (auto-detected by default)
#IMPORTANT
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyJpaCompliantImpl
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.datasource.tomcat.max-wait=20000
spring.datasource.tomcat.max-active=50
spring.datasource.tomcat.max-idle=20
spring.datasource.tomcat.min-idle=15
################################
# Internal Hosts
################################
internal.host=apidev-int.forrester.com,apitest-int.forrester.com,127.0.0.1:9026,localhost:9026,apistg-int.forrester.com,api-int.forrester.com,api2-int.forrester.com,ue1-dev-nlb-int-vpc-link-96a975755546da69.elb.us-east-1.amazonaws.com,ue1-tst-nlb-int-vpc-link-ca19535ea9e0d93c.elb.us-east-1.amazonaws.com,ue1-stg-nlb-int-vpc-link-c35efac9e2caab00.elb.us-east-1.amazonaws.com,ue1-prd-nlb-int-vpc-link-3ba588ebe97803b8.elb.us-east-1.amazonaws.com
